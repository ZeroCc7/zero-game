<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>5v5 回合制战斗原型布局</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", system-ui, sans-serif;
      color: #f0eadf;
      background: #111318;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 26px; font-weight: 700; }
    .subtitle { color: #b8b2a8; margin: 0 0 22px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(260px, 1fr)); gap: 18px; }
    .card {
      border: 1px solid #3a3f4a;
      border-radius: 8px;
      background: #1b1f27;
      overflow: hidden;
    }
    .preview { height: 280px; padding: 14px; background: #16191f; }
    .body { padding: 14px 16px 18px; }
    .body h2 { font-size: 18px; margin: 0 0 8px; }
    .body p { margin: 0; color: #c7c0b5; line-height: 1.55; }
    button { border: 1px solid #77613a; background: #2c2b28; color: #f0eadf; border-radius: 6px; }
    .dot { width: 42px; height: 42px; border-radius: 50%; display: inline-block; }
    .enemy { background: #8b2830; }
    .ally { background: #256d9b; }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>5v5 回合制战斗原型：界面布局</h1>
  <p class="subtitle">先选第一版的战斗画面结构，不讨论美术精度。我推荐 A。</p>

  <div class="grid">
    <section class="card">
      <div class="preview" style="display:grid;grid-template-rows:38px 1fr 76px;gap:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #555;padding-bottom:8px;">
          <span>回合 1 / 行动条</span><span>暂停 · 倍速 · 自动</span>
        </div>
        <div style="position:relative;background:linear-gradient(160deg,#282923,#161616);border:1px solid #555;border-radius:6px;">
          <div style="position:absolute;top:28px;left:36px;display:flex;gap:14px;">
            <span class="dot enemy"></span><span class="dot enemy"></span><span class="dot enemy"></span><span class="dot enemy"></span><span class="dot enemy"></span>
          </div>
          <div style="position:absolute;bottom:28px;right:36px;display:flex;gap:14px;">
            <span class="dot ally"></span><span class="dot ally"></span><span class="dot ally"></span><span class="dot ally"></span><span class="dot ally"></span>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:120px 1fr 72px;gap:10px;">
          <div style="border:1px solid #555;border-radius:6px;padding:8px;">当前角色<br>HP / MP</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;"><button>技能1</button><button>技能2</button><button>技能3</button><button>技能4</button></div>
          <button>结束</button>
        </div>
      </div>
      <div class="body">
        <h2>A. 经典战斗面板</h2>
        <p>主战场居中，底部技能栏。最适合第一版，操作清楚，后续也容易做成参考图那种风格。</p>
      </div>
    </section>

    <section class="card">
      <div class="preview" style="display:grid;grid-template-columns:1fr 150px;gap:10px;">
        <div style="display:grid;grid-template-rows:36px 1fr 68px;gap:10px;">
          <div style="border-bottom:1px solid #555;">行动单位 · 目标提示</div>
          <div style="background:linear-gradient(160deg,#25302b,#151719);border:1px solid #555;border-radius:6px;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(2,1fr);gap:10px;padding:20px;">
            <span style="background:#8b2830;border-radius:6px;"></span><span style="background:#8b2830;border-radius:6px;"></span><span style="background:#8b2830;border-radius:6px;"></span><span style="background:#8b2830;border-radius:6px;"></span><span style="background:#8b2830;border-radius:6px;"></span>
            <span style="background:#256d9b;border-radius:6px;"></span><span style="background:#256d9b;border-radius:6px;"></span><span style="background:#256d9b;border-radius:6px;"></span><span style="background:#256d9b;border-radius:6px;"></span><span style="background:#256d9b;border-radius:6px;"></span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;"><button>技能1</button><button>技能2</button><button>技能3</button><button>技能4</button></div>
        </div>
        <div style="border:1px solid #555;border-radius:6px;padding:10px;font-size:13px;">战斗日志<br><br>叶孤城 使用 飞花逐月<br>目标受到 420 伤害</div>
      </div>
      <div class="body">
        <h2>B. 战术棋盘感</h2>
        <p>阵位更明确，日志更强。适合强调策略，但不像参考图里的仙侠战斗画面。</p>
      </div>
    </section>

    <section class="card">
      <div class="preview" style="display:grid;grid-template-rows:1fr 104px;gap:10px;">
        <div style="background:radial-gradient(circle at center,#44331d,#161616 70%);border:1px solid #555;border-radius:6px;position:relative;">
          <div style="position:absolute;top:16px;left:26px;">敌方 5 人</div>
          <div style="position:absolute;bottom:16px;right:26px;">我方 5 人</div>
          <div style="position:absolute;left:38%;top:42%;font-size:24px;">技能演出区</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div style="border:1px solid #555;border-radius:6px;padding:8px;">角色状态面板</div>
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;"><button>技能1</button><button>技能2</button><button>技能3</button><button>技能4</button></div>
        </div>
      </div>
      <div class="body">
        <h2>C. 演出优先</h2>
        <p>更像成品游戏截图，但第一版会把时间花在镜头和动画上，战斗规则验证会慢。</p>
      </div>
    </section>
  </div>
</body>
</html>
